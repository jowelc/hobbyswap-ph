<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <pattern id="diamonds" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <polygon points="18,2 34,18 18,34 2,18" fill="none" stroke="#1e3a5f" stroke-width="1"/>
    </pattern>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="400" height="560" fill="#0f172a"/>

  <!-- Diamond pattern -->
  <rect width="400" height="560" fill="url(#diamonds)"/>

  <!-- Colour sheen -->
  <rect width="400" height="560" fill="url(#sheen)"/>

  <!-- Outer border -->
  <rect x="7" y="7" width="386" height="546" rx="9" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="528" rx="7" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>

  <!-- Center medallion -->
  <circle cx="200" cy="272" r="46" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  <circle cx="200" cy="272" r="38" fill="#0a0f1e"/>
  <circle cx="200" cy="272" r="34" fill="none" stroke="#1e3a5f" stroke-width="0.6"/>

  <!-- HS monogram -->
  <text x="200" y="281" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="bold"
        fill="#1e3a5f" letter-spacing="3">HS</text>

  <!-- Brand name -->
  <text x="200" y="336" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="8" fill="#1e3a5f" letter-spacing="4">HOBBYSWAP PH</text>

  <!-- Divider line -->
  <line x1="120" y1="476" x2="280" y2="476" stroke="#1e3a5f" stroke-width="0.8"/>

  <!-- No back image label -->
  <text x="200" y="500" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="bold" fill="#64748b" letter-spacing="2">NO BACK IMAGE</text>
  <text x="200" y="522" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#3b5068" letter-spacing="3">UPLOAD TO COMPLETE</text>

  <!-- Divider line -->
  <line x1="120" y1="534" x2="280" y2="534" stroke="#1e3a5f" stroke-width="0.8"/>
</svg>
